<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 基準線 -->
  <line x1="150" y1="372" x2="372" y2="372" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round"/>
  <!-- 右肩下がりの折れ線 -->
  <polyline points="150,200 212,272 268,244 326,316 372,348"
    fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- データ点 -->
  <g fill="#ffffff">
    <circle cx="150" cy="200" r="15"/>
    <circle cx="212" cy="272" r="15"/>
    <circle cx="268" cy="244" r="15"/>
    <circle cx="326" cy="316" r="15"/>
    <circle cx="372" cy="348" r="17"/>
  </g>
</svg>